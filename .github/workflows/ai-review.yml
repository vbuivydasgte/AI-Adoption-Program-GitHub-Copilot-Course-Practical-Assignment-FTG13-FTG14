name: AI Code Review
on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    runs-on: self-hosted
    permissions:
      pull-requests: write
      contents: read
    defaults:
      run:
        shell: powershell
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get diff
        run: |
          & git diff HEAD~1 HEAD | Out-File -FilePath diff.txt -Encoding utf8
          Write-Host "Diff written, size:"
          (Get-Item diff.txt).Length

      - name: Run review
        run: |
          $diffContent = Get-Content diff.txt -Raw
          if (-not $diffContent) {
            Write-Host "No diff found, exiting"
            exit 0
          }
          $header = "Review ONLY these changes in this PR diff. Find bugs, missing tests, and refactoring opportunities only in the changed lines. Diff:"
          "$header`n`n$diffContent" | Out-File -FilePath prompt.txt -Encoding utf8
          $review = Get-Content prompt.txt -Raw | & claude --print -
          $review | Out-File -FilePath review.txt -Encoding utf8
          gh pr comment ${{ github.event.pull_request.number }} --body-file review.txt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
