jobs:
  review:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Run review
        run: |
          claude --print "Review PR #${{ github.event.pull_request.number }}: \
          check the diff at origin/${{ github.head_ref }} for bugs, \
          missing tests, and refactoring opportunities. \
          Post findings as a comment."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
