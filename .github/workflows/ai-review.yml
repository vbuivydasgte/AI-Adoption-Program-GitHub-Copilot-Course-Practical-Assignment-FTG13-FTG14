name: AI Code Review
on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    runs-on: self-hosted
    permissions:
      pull-requests: write
      contents: read
    defaults:
      run:
        shell: powershell
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run review
        run: |
          $diff = & git diff origin/main..HEAD
          if (-not $diff) {
            Write-Host "No diff found, exiting"
            exit 0
          }
          $diff | Out-File -FilePath diff.txt -Encoding utf8
          $diffContent = Get-Content diff.txt -Raw
          $prompt = "Review ONLY these changes in this PR diff and nothing else. Do not comment on existing code outside this diff. Here is the diff:`n$diffContent`n`nFind bugs, missing tests, and refactoring opportunities only in the changed lines."
          $review = & claude --print $prompt
          $review | Out-File -FilePath review.txt -Encoding utf8
          gh pr comment ${{ github.event.pull_request.number }} --body-file review.txt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
