name: AI Code Review
on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    runs-on: self-hosted
    permissions:
      pull-requests: write
      contents: read
    defaults:
      run:
        shell: powershell
    steps:
      - uses: actions/checkout@v4
      - name: Run review
        run: |
          $prompt = "Review PR #${{ github.event.pull_request.number }}: check the diff at origin/${{ github.head_ref }} for bugs, missing tests, and refactoring opportunities."
          $review = claude --print $prompt
          $review | Out-File -FilePath review.txt -Encoding utf8
          gh pr comment ${{ github.event.pull_request.number }} --body-file review.txt
        shell: powershell
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
