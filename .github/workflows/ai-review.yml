name: AI Code Review
on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    runs-on: self-hosted
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4
      - name: Run review
        run: |
          $review = claude --print "Review PR #${{ github.event.pull_request.number }}: check the diff at origin/${{ github.head_ref }} for bugs, missing tests, and refactoring opportunities."
          gh pr comment ${{ github.event.pull_request.number }} --body $review
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
